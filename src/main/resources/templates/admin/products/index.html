<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<div th:replace="~{fragment :: meta}"></div>
	<div th:replace="~{fragment :: styles}"></div>
	<title>商品管理 | 管理画面</title>
</head>

<body>
	<div th:replace="~{fragment :: header}"></div>

	<main class="container py-4">
		<div class="row justify-content-center">
			<div class="col-12 col-xl-11">

				<div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
					<div>
						<p class="text-muted small mb-1">ADMIN PRODUCTS</p>
						<h1 class="h3 mb-0 fw-bold">商品管理</h1>
					</div>
					<div>
						<a th:href="@{/admin/products/create}" class="btn btn-dark">
							<i class="bi bi-plus-lg me-1"></i>商品を登録
						</a>
					</div>
				</div>

				<div class="card border-0 shadow-sm">
					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table align-middle mb-0">
								<thead class="table-light">
									<tr>
										<th class="ps-4">ID</th>
										<th>商品名</th>
										<th>価格</th>
										<th>カテゴリ</th>
										<th>在庫</th>
										<th>公開状態</th>
										<th class="text-end pe-4">操作</th>
									</tr>
								</thead>
								<tbody>
									<tr th:if="${#lists.isEmpty(productList)}">
										<td colspan="7" class="text-center text-muted py-5">
											商品がまだ登録されていません。
										</td>
									</tr>

									<tr th:each="product : ${productList}">
										<td class="ps-4 fw-semibold" th:text="${product.getId()}">1</td>
										<td>
											<div class="fw-semibold" th:text="${product.getName()}">商品名</div>
											<div class="small text-muted"
												th:text="${product.getDescription() != null and !product.getDescription().isEmpty() ? #strings.abbreviate(product.getDescription(), 40) : '説明なし'}">
												説明
											</div>
										</td>
										<td th:text="${#numbers.formatInteger(product.getPrice(), 1, 'COMMA')} + '円'">
											2,980円
										</td>

										<!-- 修正（HTML）：categoryIdからカテゴリ名を表示 -->
										<td
											th:text="${product.getCategoryId() != null and categoryNameMap.containsKey(product.getCategoryId()) ? categoryNameMap.get(product.getCategoryId()) : '未設定'}">
											カテゴリ
										</td>
										<td
											th:text="${stockMap.containsKey(product.id) ? stockMap.get(product.id) + '個' : '0個'}">
											0個</td>
										<td>
											<span th:if="${product.getIsActive()}" class="badge text-bg-dark">公開</span>
											<span th:unless="${product.getIsActive()}"
												class="badge text-bg-secondary">非公開</span>
										</td>
										<td class="text-end pe-4">
											<div class="d-flex justify-content-end gap-2">
												<a th:href="@{/admin/products/{id}/edit(id=${product.getId()})}"
													class="btn btn-outline-dark btn-sm">
													編集
												</a>

												<form th:action="@{/admin/products/{id}/delete(id=${product.getId()})}"
													method="post" onsubmit="return confirm('この商品を削除します。よろしいですか？');">
													<input type="hidden" th:name="${_csrf.parameterName}"
														th:value="${_csrf.token}">
													<button type="submit" class="btn btn-dark btn-sm">
														削除
													</button>
												</form>
											</div>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>

			</div>
		</div>
	</main>

	<div th:replace="~{fragment :: footer}"></div>
	<div th:replace="~{fragment :: scripts}"></div>
</body>

</html>
