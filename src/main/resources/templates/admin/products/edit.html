<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<div th:replace="~{fragment :: meta}"></div>
	<div th:replace="~{fragment :: styles}"></div>
	<title>商品編集 | 管理画面</title>
</head>

<body>
	<div th:replace="~{fragment :: header}"></div>

	<main class="container py-4">
		<div class="row justify-content-center">
			<div class="col-12 col-lg-8 col-xl-7">

				<div class="mb-4">
					<p class="text-muted small mb-1">ADMIN PRODUCTS</p>
					<h1 class="h3 mb-0 fw-bold">商品編集</h1>
				</div>

				<div class="card border-0 shadow-sm">
					<div class="card-body p-4 p-md-5">

						<form th:action="@{/admin/products/{id}/update(id=${product.getId()})}" method="post">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

							<div class="mb-3">
								<label for="name" class="form-label fw-semibold">商品名</label>
								<input type="text" id="name" name="name" class="form-control"
									th:value="${product.getName()}" required>
							</div>

							<div class="mb-3">
								<label for="price" class="form-label fw-semibold">価格</label>
								<input type="number" id="price" name="price" class="form-control"
									th:value="${product.getPrice()}" min="0" required>
							</div>

							<!-- 修正（HTML）：カテゴリ選択 -->
							<div class="mb-3">
								<label for="categoryId" class="form-label fw-semibold">カテゴリ</label>
								<select id="categoryId" name="categoryId" class="form-select" required>
									<option value="">カテゴリを選択してください</option>
									<option th:each="category : ${categories}" th:value="${category.getId()}"
										th:text="${category.getName()}"
										th:selected="${product.getCategoryId() == category.getId()}">
										カテゴリ名
									</option>
								</select>
							</div>

							<div class="mb-3">
								<label for="description" class="form-label fw-semibold">説明</label>
								<textarea id="description" name="description" class="form-control" rows="5"
									th:text="${product.getDescription()}"></textarea>
							</div>

							<div class="mb-3">
								<label for="imageName" class="form-label fw-semibold">画像ファイル名</label>
								<input type="text" id="imageName" name="imageName" class="form-control"
									th:value="${product.getImageName()}">
							</div>

							<div class="mb-3">
								<label for="isActive" class="form-label fw-semibold">公開状態</label>
								<select id="isActive" name="isActive" class="form-select" required>
									<option th:value="true" th:selected="${product.getIsActive()}">公開</option>
									<option th:value="false" th:selected="${!product.getIsActive()}">非公開</option>
								</select>
							</div>

							<!-- 修正（HTML）：現在在庫表示 -->
							<div class="mb-3">
								<label class="form-label fw-semibold">現在在庫</label>
								<input type="text" class="form-control" th:value="${currentStock} + ' 個'" readonly>
							</div>

							<!-- 修正（HTML）：追加入庫 -->
							<div class="mb-4">
								<label for="addStock" class="form-label fw-semibold">在庫追加</label>
								<input type="number" id="addStock" name="addStock" class="form-control" min="0"
									value="0">
								<div class="form-text">入力した数だけ現在在庫に加算されます。</div>
							</div>

							<div class="d-flex gap-2">
								<button type="submit" class="btn btn-dark">
									更新する
								</button>
								<a th:href="@{/admin/products}" class="btn btn-outline-secondary">
									戻る
								</a>
							</div>
						</form>

					</div>
				</div>

			</div>
		</div>
	</main>

	<div th:replace="~{fragment :: footer}"></div>
	<div th:replace="~{fragment :: scripts}"></div>
</body>

</html>
