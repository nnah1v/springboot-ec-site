<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<div th:replace="~{fragment :: meta}"></div>
	<div th:replace="~{fragment :: styles}"></div>
	<title>商品登録 | 管理画面</title>
</head>

<body>
	<div th:replace="~{fragment :: header}"></div>

	<main class="container py-4">
		<div class="row justify-content-center">
			<div class="col-12 col-lg-8 col-xl-7">

				<div class="mb-4">
					<p class="text-muted small mb-1">ADMIN PRODUCTS</p>
					<h1 class="h3 mb-0 fw-bold">商品登録</h1>
				</div>

				<div class="card border-0 shadow-sm">
					<div class="card-body p-4 p-md-5">

						<form th:action="@{/admin/products/store}" method="post" th:object="${product}">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

							<div class="mb-3">
								<label for="name" class="form-label fw-semibold">商品名</label>
								<input type="text" id="name" th:field="*{name}" class="form-control" required>
							</div>

							<div class="mb-3">
								<label for="price" class="form-label fw-semibold">価格</label>
								<input type="number" id="price" th:field="*{price}" class="form-control" min="0"
									required>
							</div>

							<!-- 修正（HTML）：カテゴリ選択 -->
							<div class="mb-3">
								<label for="categoryId" class="form-label fw-semibold">カテゴリ</label>
								<select id="categoryId" th:field="*{categoryId}" class="form-select" required>
									<option value="">カテゴリを選択してください</option>
									<option th:each="category : ${categories}" th:value="${category.getId()}"
										th:text="${category.getName()}">
										カテゴリ名
									</option>
								</select>
							</div>

							<div class="mb-3">
								<label for="description" class="form-label fw-semibold">説明</label>
								<textarea id="description" th:field="*{description}" class="form-control"
									rows="5"></textarea>
							</div>

							<div class="mb-3">
								<label for="imageName" class="form-label fw-semibold">画像ファイル名</label>
								<input type="text" id="imageName" th:field="*{imageName}" class="form-control">
							</div>

							<!-- 修正（HTML）：初期在庫を追加 -->
							<div class="mb-3">
								<label for="initialStock" class="form-label fw-semibold">初期在庫</label>
								<input type="number" id="initialStock" name="initialStock" class="form-control" min="0"
									value="0" required>
							</div>

							<div class="mb-4">
								<label for="isActive" class="form-label fw-semibold">公開状態</label>
								<select id="isActive" th:field="*{isActive}" class="form-select" required>
									<option th:value="true">公開</option>
									<option th:value="false">非公開</option>
								</select>
							</div>

							<div class="d-flex gap-2">
								<button type="submit" class="btn btn-dark">
									登録する
								</button>
								<a th:href="@{/admin/products}" class="btn btn-outline-secondary">
									戻る
								</a>
							</div>
						</form>

					</div>
				</div>

			</div>
		</div>
	</main>

	<div th:replace="~{fragment :: footer}"></div>
	<div th:replace="~{fragment :: scripts}"></div>
</body>

</html>
