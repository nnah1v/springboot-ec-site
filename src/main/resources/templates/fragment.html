<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<!-- meta -->
	<div th:fragment="meta" th:remove="tag">
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<!-- 修正（HTML）：CSRF（JSから読む） -->
		<meta name="_csrf" th:content="${_csrf.token}">
		<meta name="_csrf_header" th:content="${_csrf.headerName}">
	</div>

	<!-- styles -->
	<div th:fragment="styles" th:remove="tag">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
		<link rel="stylesheet" th:href="@{/css/ec.css}">
	</div>
</head>

<body>

	<!-- header -->
	<div th:fragment="header" th:remove="tag">

		<header class="ec-topbar">
			<div class="container-fluid px-3 ec-topbar-inner">

				<!-- 未ログインはトップへ -->
				<a class="ec-brand" sec:authorize="isAnonymous()" th:href="@{/}">
					<span class="ec-brand-text">SÖLA</span>
				</a>

				<!-- ログイン後はマイページへ -->
				<a class="ec-brand" sec:authorize="isAuthenticated()" th:href="@{/mypage}">
					<span class="ec-brand-text">SÖLA</span>
				</a>

			</div>
		</header>

		<nav class="ec-iconbar" aria-label="primary">

			<!-- 修正（HTML）：検索バー本体はnav直下 -->
			<div id="searchOverlay" class="ec-search-overlay">
				<div class="ec-search-panel">
					<form th:action="@{/products}" method="get" class="ec-search-form">
						<div class="ec-search-input-wrap">
							<i class="bi bi-search ec-search-input-icon" aria-hidden="true"></i>
							<input type="text" id="searchKeyword" name="keyword" class="ec-search-input"
								placeholder="商品名・カテゴリで検索">
							<button type="submit" class="ec-search-submit-button">検索</button>
						</div>
					</form>
				</div>
			</div>

			<div class="container-fluid px-0">
				<div class="ec-iconbar-grid">

					<!-- 修正（HTML）：検索ボタンはgridの中 -->
					<button type="button" id="searchToggleButton" class="ec-icon-item ec-icon-button">
						<i class="bi bi-search ec-icon" aria-hidden="true"></i>
						<span class="ec-icon-label">検索</span>
					</button>

					<!-- 修正（HTML）：カテゴリはDBからループ表示 -->
					<div class="dropdown">
						<button class="ec-icon-item ec-icon-button dropdown-toggle" type="button"
							data-bs-toggle="dropdown" aria-expanded="false">
							<i class="bi bi-grid ec-icon" aria-hidden="true"></i>
							<span class="ec-icon-label">カテゴリー</span>
						</button>

						<ul class="dropdown-menu dropdown-menu-end ec-dropdown">
							<li th:each="category : ${categories}">
								<a class="dropdown-item ec-dropdown-item"
									th:href="@{/products(categoryId=${category.getId()})}"
									th:text="${category.getName()}">カテゴリ名</a>
							</li>
						</ul>
					</div>

					<a class="ec-icon-item" th:href="@{/cart}">
						<i class="bi bi-cart3 ec-icon" aria-hidden="true"></i>
						<span class="ec-icon-label">カート</span>
					</a>

					<a class="ec-icon-item" th:href="@{/history}">
						<i class="bi bi-clock-history ec-icon" aria-hidden="true"></i>
						<span class="ec-icon-label">閲覧履歴</span>
					</a>

					<div class="dropdown">
						<button class="ec-icon-item ec-icon-button dropdown-toggle" type="button"
							data-bs-toggle="dropdown" aria-expanded="false">
							<i class="bi bi-list ec-icon" aria-hidden="true"></i>
							<span class="ec-icon-label">メニュー</span>
						</button>

						<ul class="dropdown-menu dropdown-menu-end ec-dropdown">
							<li sec:authorize="isAnonymous()">
								<a class="dropdown-item ec-dropdown-item" th:href="@{/login}">ログイン</a>
							</li>
							<li sec:authorize="isAnonymous()">
								<a class="dropdown-item ec-dropdown-item" th:href="@{/signup}">会員登録</a>
							</li>

							<li sec:authorize="isAuthenticated()">
								<a class="dropdown-item ec-dropdown-item" th:href="@{/orders}">注文履歴</a>
							</li>
							<li sec:authorize="isAuthenticated()">
								<a class="dropdown-item ec-dropdown-item" th:href="@{/mypage/profile}">会員情報</a>
							</li>
							<li sec:authorize="isAuthenticated()">
								<a class="dropdown-item ec-dropdown-item" th:href="@{/favorites}">お気に入り</a>
							</li>

							<li sec:authorize="hasRole('ADMIN')">
								<a class="dropdown-item ec-dropdown-item" th:href="@{/admin/products}">管理画面</a>
							</li>

							<li sec:authorize="isAuthenticated()">
								<hr class="dropdown-divider">
							</li>

							<li sec:authorize="isAuthenticated()">
								<form th:action="@{/logout}" method="post" class="px-3">
									<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
									<button class="btn btn-outline-dark w-100 ec-logout-button"
										type="submit">ログアウト</button>
								</form>
							</li>
						</ul>
					</div>

				</div>
			</div>
		</nav>
	</div>

	<!-- footer -->
	<div th:fragment="footer" th:remove="tag">
		<footer class="ec-footer border-top bg-white mt-5">
			<div class="container py-3 text-center text-muted small">
				<span>© SÖLA</span>
			</div>
		</footer>
	</div>

	<!-- scripts -->
	<div th:fragment="scripts" th:remove="tag">
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
		<script th:src="@{/js/ec.js}"></script>
	</div>

</body>

</html>
