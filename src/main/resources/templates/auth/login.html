<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<div th:replace="~{fragment :: meta}"></div>
	<div th:replace="~{fragment :: styles}"></div>
	<title>ログイン</title>
</head>

<body class="ec-login-page">

	<div th:replace="~{fragment :: header}"></div>

	<main class="ec-login-page">
		<div class="container py-5">
			<div class="row justify-content-center">
				<div class="col-xl-5 col-lg-6 col-md-8 col-sm-10">

					<section class="ec-login-card">

						<div class="ec-auth-header">
							<p class="ec-auth-eyebrow">LOGIN</p>
							<h1 class="ec-auth-title">ログイン</h1>
						</div>

						<!-- 修正（HTML）：会員情報更新やメール変更後の案内を表示 -->
						<div class="alert alert-success mb-4" th:if="${successMessage}" th:text="${successMessage}">
							完了メッセージ
						</div>

						<!-- 修正（HTML）：ログイン失敗時のメッセージを表示 -->
						<div class="alert alert-danger mb-4" th:if="${param.error}">
							メールアドレスまたはパスワードが正しくありません。
						</div>

						<form th:action="@{/login}" method="post">

							<!-- 修正（HTML）：CSRFトークン -->
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

							<div class="mb-4">
								<label class="ec-login-label">メールアドレス</label>
								<input type="text" class="form-control ec-login-input" name="email" required>
							</div>

							<div class="mb-5">
								<label class="ec-login-label">パスワード</label>
								<input type="password" class="form-control ec-login-input" name="password" required>
							</div>

							<button type="submit" class="btn ec-login-btn w-100">
								ログインする
							</button>

						</form>

						<hr class="ec-login-divider">

						<div class="text-center mb-4">
							<span class="small text-muted">初めての方はこちら</span><br>
							<a th:href="@{/signup}" class="ec-login-register">
								会員登録
							</a>
						</div>

						<div class="text-center">
							<a th:href="@{/products}" class="ec-login-back">
								商品一覧へ戻る
							</a>
						</div>

					</section>
				</div>
			</div>
		</div>
	</main>

	<div th:replace="~{fragment :: footer}"></div>
	<div th:replace="~{fragment :: scripts}"></div>

</body>

</html>
