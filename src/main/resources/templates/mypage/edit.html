<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<div th:replace="~{fragment :: meta}"></div>
	<div th:replace="~{fragment :: styles}"></div>

	<title>会員情報編集</title>
</head>

<body>

	<div th:replace="~{fragment :: header}"></div>

	<main class="container py-5" style="max-width:1000px;">

		<h1 class="fw-light mb-5 border-bottom pb-3">Profile Edit</h1>

		<div class="row justify-content-center">
			<div class="col-lg-10">

				<div class="card border-0 shadow-sm">
					<div class="card-body p-4 p-md-5">

						<form th:action="@{/mypage/profile/update}" method="post" th:object="${user}">

							<!-- 修正（HTML）：CSRFトークン -->
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

							<!-- 修正（HTML）：エラーメッセージ表示 -->
							<div class="alert alert-danger mb-4" th:if="${errorMessage}" th:text="${errorMessage}">
								エラーメッセージ
							</div>

							<!-- 修正（HTML）：成功メッセージ表示（必要時のみ） -->
							<div class="alert alert-success mb-4" th:if="${successMessage}" th:text="${successMessage}">
								更新完了メッセージ
							</div>

							<div class="mb-4">
								<label class="form-label text-muted">ニックネーム</label>
								<input type="text" class="form-control" th:field="*{nickname}">
							</div>

							<div class="mb-4">
								<label class="form-label text-muted">氏名</label>
								<input type="text" class="form-control" th:field="*{name}">
							</div>

							<div class="mb-4">
								<label class="form-label text-muted">フリガナ</label>
								<input type="text" class="form-control" th:field="*{furigana}">
							</div>

							<div class="mb-4">
								<label class="form-label text-muted">郵便番号</label>
								<input type="text" class="form-control" th:field="*{postalCode}">
							</div>

							<div class="mb-4">
								<label class="form-label text-muted">住所</label>
								<input type="text" class="form-control" th:field="*{address}">
							</div>

							<div class="mb-4">
								<label class="form-label text-muted">電話番号</label>
								<input type="text" class="form-control" th:field="*{phoneNumber}">
							</div>

							<div class="mb-4">
								<label class="form-label text-muted">メールアドレス</label>
								<input type="email" class="form-control" th:field="*{email}">
							</div>

							<div class="d-flex justify-content-between mt-5">

								<a th:href="@{/mypage/profile}" class="btn btn-outline-dark">
									戻る
								</a>

								<button type="submit" class="btn btn-dark">
									更新する
								</button>

							</div>

						</form>

					</div>
				</div>

			</div>
		</div>

	</main>

	<div th:replace="~{fragment :: footer}"></div>
	<div th:replace="~{fragment :: scripts}"></div>

</body>

</html>
