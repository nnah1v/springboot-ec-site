<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<div th:replace="~{fragment :: meta}"></div>
	<div th:replace="~{fragment :: styles}"></div>

	<title th:text="${product.getName()} + ' | 商品詳細'">商品詳細</title>
</head>

<body>
	<div class="moattravel-wrapper">
		<div th:replace="~{fragment :: header}"></div>

		<main>
			<div class="container pt-4 pb-5 moattravel-container">
				<div class="row justify-content-center">
					<div class="col-xxl-9 col-xl-10 col-lg-11">

						<nav class="mb-4" style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
							<ol class="breadcrumb mb-0">
								<li class="breadcrumb-item"><a th:href="@{/}">ホーム</a></li>
								<li class="breadcrumb-item"><a th:href="@{/products}">商品一覧</a></li>
								<li class="breadcrumb-item active" aria-current="page">商品詳細</li>
							</ol>
						</nav>

						<h1 class="mb-4 text-center" th:text="${product.getName()}">商品名</h1>

						<div class="row g-4">

							<!-- 修正（HTML）：画像はメイン + サムネ3（全部noimage固定） -->
							<div class="col-md-6">

								<div class="border rounded bg-white p-2">
									<img th:src="@{/images/noimage.png}" class="img-fluid rounded shadow-sm"
										alt="no image">
								</div>

								<div class="d-flex gap-2 mt-2">
									<div class="border rounded bg-white p-1" style="width: 80px; height: 80px;">
										<img th:src="@{/images/noimage.png}" alt="no image"
											style="width:100%;height:100%;object-fit:cover;border-radius:6px;">
									</div>

									<div class="border rounded bg-white p-1" style="width: 80px; height: 80px;">
										<img th:src="@{/images/noimage.png}" alt="no image"
											style="width:100%;height:100%;object-fit:cover;border-radius:6px;">
									</div>

									<div class="border rounded bg-white p-1" style="width: 80px; height: 80px;">
										<img th:src="@{/images/noimage.png}" alt="no image"
											style="width:100%;height:100%;object-fit:cover;border-radius:6px;">
									</div>
								</div>

							</div>

							<div class="col-md-6">
								<div class="card shadow-sm">
									<div class="card-body">

										<div class="mb-3">
											<div class="text-muted">価格</div>
											<div class="fs-3 fw-bold"
												th:text="${#numbers.formatInteger(product.getPrice(), 1, 'COMMA')} + '円'">
												0円
											</div>
										</div>

										<div class="mb-3" th:if="${stock != null}">
											<div class="text-muted">在庫</div>
											<div class="fs-5" th:text="${stock} + '個'">0個</div>
										</div>

										<div class="mb-4">
											<div class="text-muted">説明</div>
											<div class="moattravel-pre-wrap" th:text="${product.getDescription()}">説明文
											</div>
										</div>

										<div class="d-flex align-items-center gap-3 mb-3">

											<div class="d-flex align-items-center gap-2">
												<div class="text-muted">数量</div>
												<input type="number" class="form-control" value="1" min="1"
													style="width: 90px;">
											</div>

											<button type="button" class="btn cart-button flex-grow-1 py-3">
												カートに入れる
											</button>

											<button type="button" class="btn favorite-button rounded"
												style="width:48px;height:48px;">
												<i class="bi bi-heart"></i>
											</button>

										</div>

									</div>
								</div>

								<div class="mt-3 p-3 border rounded bg-light">
									<div class="fw-bold mb-2">送料・配送について</div>

									<ul class="mb-2">
										<li>送料：全国一律 550円（税込）</li>
										<li>5,000円以上で送料無料</li>
										<li>2〜4営業日以内に発送</li>
									</ul>

									<div class="small text-muted">
										※天候や交通状況により遅延する場合があります。
									</div>
								</div>

							</div>
						</div>

					</div>
				</div>
			</div>
		</main>

		<div th:replace="~{fragment :: footer}"></div>
	</div>

	<div th:replace="~{fragment :: scripts}"></div>
</body>

</html>
