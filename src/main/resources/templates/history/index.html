<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<div th:replace="~{fragment :: meta}"></div>
	<div th:replace="~{fragment :: styles}"></div>
	<title>閲覧履歴</title>
</head>

<body>
	<div th:replace="~{fragment :: header}"></div>

	<main class="container py-5" style="max-width:1000px;">

		<h1 class="fw-light mb-5 border-bottom pb-3">History</h1>

		<!-- 修正（HTML）：履歴がある場合 -->
		<section th:if="${productPage != null && productPage.totalElements > 0}">
			<div class="row g-4">

				<div class="col-12 col-md-6" th:each="product : ${productPage.getContent()}">
					<article class="border bg-white h-100">

						<div class="row g-0 h-100">
							<div class="col-4">
								<a th:href="@{/products/{id}(id=${product.getId()})}" class="d-block h-100">
									<img th:src="@{/images/noimage.png}" alt="No Image" class="img-fluid w-100 h-100"
										style="object-fit:cover; aspect-ratio:1 / 1;">
								</a>
							</div>

							<div class="col-8">
								<div class="p-4 h-100 d-flex flex-column">

									<p class="text-muted small mb-2">閲覧した商品</p>

									<h2 class="h5 fw-normal mb-3" style="line-height:1.6;">
										<a th:href="@{/products/{id}(id=${product.getId()})}"
											class="text-dark text-decoration-none" th:text="${product.getName()}">
											商品名
										</a>
									</h2>

									<p class="text-muted small mb-3" th:text="${product.getDescription()}">
										商品説明
									</p>

									<div class="mt-auto d-flex justify-content-between align-items-center">
										<div>
											<span class="fs-5"
												th:text="${#numbers.formatInteger(product.getPrice(), 1, 'COMMA')}">
												0
											</span>
											<span class="ms-1">円</span>
											<span class="text-muted small ms-1">税込</span>
										</div>

										<a th:href="@{/products/{id}(id=${product.getId()})}"
											class="btn btn-outline-dark btn-sm rounded-0">
											詳細を見る
										</a>
									</div>

								</div>
							</div>
						</div>

					</article>
				</div>

			</div>
		</section>

		<!-- 修正（HTML）：履歴がない場合 -->
		<section th:if="${productPage == null || productPage.totalElements == 0}">
			<div class="border bg-white text-center py-5 px-3">
				<p class="mb-2 fs-5">閲覧履歴はありません</p>
				<p class="text-muted mb-4">商品詳細を開くと、ここに履歴が表示されます。</p>
				<a th:href="@{/products}" class="btn btn-dark rounded-0">商品一覧へ</a>
			</div>
		</section>

		<!-- 修正（HTML）：ページネーション -->
		<section class="mt-5" th:if="${productPage != null && productPage.totalElements > 0}">
			<div class="d-flex justify-content-between align-items-center flex-wrap gap-3 border-top pt-4">

				<div class="text-muted small">
					<span th:text="${productPage.getTotalElements()}">0</span>件中
					<span th:text="${productPage.getNumber() * productPage.getSize() + 1}">1</span>
					-
					<span
						th:text="${productPage.getNumber() * productPage.getSize() + productPage.getNumberOfElements()}">0</span>
					件表示
				</div>

				<nav th:if="${productPage.getTotalPages() > 1}">
					<ul class="pagination mb-0">

						<li class="page-item" th:classappend="${!productPage.hasPrevious()} ? ' disabled'">
							<a class="page-link text-dark rounded-0 border-dark-subtle"
								th:href="${productPage.hasPrevious()} ? @{/history(page=${productPage.getNumber() - 1}, size=${productPage.getSize()})} : '#'}">
								前へ
							</a>
						</li>

						<li class="page-item disabled">
							<span class="page-link text-dark bg-white rounded-0 border-dark-subtle">
								<span th:text="${productPage.getNumber() + 1}">1</span>
								/
								<span th:text="${productPage.getTotalPages()}">1</span>
							</span>
						</li>

						<li class="page-item" th:classappend="${!productPage.hasNext()} ? ' disabled'">
							<a class="page-link text-dark rounded-0 border-dark-subtle"
								th:href="${productPage.hasNext()} ? @{/history(page=${productPage.getNumber() + 1}, size=${productPage.getSize()})} : '#'}">
								次へ
							</a>
						</li>

					</ul>
				</nav>
			</div>
		</section>

	</main>

	<div th:replace="~{fragment :: footer}"></div>
	<div th:replace="~{fragment :: scripts}"></div>
</body>

</html>
