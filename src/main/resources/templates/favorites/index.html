<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<div th:replace="~{fragment :: meta}"></div>
	<div th:replace="~{fragment :: styles}"></div>
	<title>お気に入り | SÖLA</title>
</head>

<body class="bg-white text-dark">

	<div th:replace="~{fragment :: header}"></div>

	<main class="container py-5" style="max-width:1000px;">

		<h1 class="fw-light mb-5 border-bottom pb-3">Favorites</h1>

		<div th:if="${#lists.isEmpty(favorites)}" class="text-center text-muted py-5">
			<p class="mb-4">お気に入りはまだありません。</p>
			<a th:href="@{/products}" class="btn btn-dark px-4">
				商品を見る
			</a>
		</div>

		<div th:unless="${#lists.isEmpty(favorites)}" class="row g-4">

			<div class="col-md-4" th:each="product : ${favorites}">

				<div class="border rounded-0 p-4 h-100 text-center">

					<img th:src="@{/images/noimage.png}" class="img-fluid mb-3"
						style="aspect-ratio:4/3; object-fit:cover;">

					<h6 class="fw-light" th:text="${product.name}">
					</h6>

					<p class="text-muted small mb-3" th:text="${#numbers.formatInteger(product.price,1,'COMMA')} + '円'">
					</p>

					<div class="d-grid gap-2">
						<a th:href="@{'/products/' + ${product.id}}" class="btn btn-outline-dark btn-sm">
							詳細を見る
						</a>

						<form th:action="@{/favorites/remove}" method="post">
							<input type="hidden" name="productId" th:value="${product.id}">
							<button type="submit" class="btn btn-sm btn-dark">
								削除
							</button>
						</form>
					</div>

				</div>

			</div>

		</div>

	</main>

	<div th:replace="~{fragment :: footer}"></div>
	<div th:replace="~{fragment :: scripts}"></div>

</body>

</html>
