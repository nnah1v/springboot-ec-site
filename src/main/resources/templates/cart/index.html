<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<div th:replace="~{fragment :: meta}"></div>
	<div th:replace="~{fragment :: styles}"></div>
	<title>Shopping Cart | SÖLA</title>
</head>

<body class="bg-white text-dark">

	<div th:replace="~{fragment :: header}"></div>

	<main class="container py-5" style="max-width:1000px;">

		<h1 class="fw-light mb-5 border-bottom pb-3">Shopping Cart</h1>

		<!-- 修正（HTML）：成功メッセージ -->
		<div th:if="${successMessage}" class="alert alert-success mb-4" role="alert">
			<span th:text="${successMessage}">成功メッセージ</span>
		</div>

		<!-- 修正（HTML）：エラーメッセージ -->
		<div th:if="${errorMessage}" class="alert alert-danger mb-4" role="alert">
			<span th:text="${errorMessage}">エラーメッセージ</span>
		</div>

		<div th:if="${#lists.isEmpty(cartLines)}" class="text-center text-muted py-5">
			<p class="mb-4">カートに商品はありません。</p>
			<a th:href="@{/products}" class="btn btn-dark px-4">商品を見る</a>
		</div>

		<div th:unless="${#lists.isEmpty(cartLines)}">

			<table class="table align-middle">
				<thead class="border-bottom">
					<tr class="text-muted small">
						<th>商品</th>
						<th class="text-end">単価</th>
						<th class="text-center">数量</th>
						<th class="text-end">小計</th>
						<th></th>
					</tr>
				</thead>

				<tbody>
					<!-- 修正（HTML）：ゲスト（CartLineView） -->
					<tr th:if="${isGuest}" th:each="line : ${cartLines}" class="border-bottom">
						<td class="fw-light" th:text="${line.productName}">Product</td>

						<td class="text-end" th:text="${#numbers.formatInteger(line.unitPrice,1,'COMMA')} + '円'">
						</td>

						<td class="text-center" th:text="${line.quantity}"></td>

						<td class="text-end fw-medium"
							th:text="${#numbers.formatInteger(line.lineTotal,1,'COMMA')} + '円'">
						</td>

						<td class="text-end">
							<form th:action="@{/cart/delete}" method="post">
								<input type="hidden" name="productId" th:value="${line.productId}">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
								<button type="submit" class="btn btn-sm btn-outline-dark">削除</button>
							</form>
						</td>
					</tr>

					<!-- 修正（HTML）：ログイン（CartItem + product） -->
					<tr th:unless="${isGuest}" th:each="item : ${cartLines}" class="border-bottom">
						<td class="fw-light" th:text="${item.product.name}">Product</td>

						<td class="text-end" th:text="${#numbers.formatInteger(item.product.price,1,'COMMA')} + '円'">
						</td>

						<td class="text-center" th:text="${item.quantity}"></td>

						<td class="text-end fw-medium"
							th:text="${#numbers.formatInteger(item.product.price * item.quantity,1,'COMMA')} + '円'">
						</td>

						<td class="text-end">
							<form th:action="@{/cart/delete}" method="post">
								<input type="hidden" name="productId" th:value="${item.product.id}">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
								<button type="submit" class="btn btn-sm btn-outline-dark">削除</button>
							</form>
						</td>
					</tr>
				</tbody>
			</table>

			<div class="d-flex justify-content-end mt-5 border-top pt-4">
				<div style="width:100%; max-width:360px;">

					<div class="d-flex justify-content-between align-items-center mb-2">
						<span class="text-muted">小計</span>
						<span th:text="${#numbers.formatInteger(totalAmount,1,'COMMA')} + '円'">0円</span>
					</div>

					<div class="d-flex justify-content-between align-items-center mb-2" th:if="${discountAmount > 0}">
						<span class="text-muted">割引</span>
						<span th:text="'- ' + ${#numbers.formatInteger(discountAmount,1,'COMMA')} + '円'">- 0円</span>
					</div>

					<div class="text-end text-muted small mb-3" th:if="${discountAmount > 0}">
						割引が適用されています
					</div>

					<hr class="my-3">

					<div class="d-flex justify-content-between align-items-center mb-4">
						<span class="fs-4">合計</span>
						<strong class="fs-2"
							th:text="${#numbers.formatInteger(finalAmount,1,'COMMA')} + '円'">0円</strong>
					</div>

					<div th:unless="${isGuest}">
						<form th:action="@{/orders}" method="post">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
							<button type="submit" class="btn btn-dark w-100 py-3">
								注文する
							</button>
						</form>
					</div>

					<div th:if="${isGuest}">
						<a th:href="@{/login}" class="btn btn-outline-dark w-100 py-3">
							購入するにはログイン
						</a>
					</div>

				</div>
			</div>

		</div>

	</main>

	<div th:replace="~{fragment :: footer}"></div>
	<div th:replace="~{fragment :: scripts}"></div>

</body>

</html>
